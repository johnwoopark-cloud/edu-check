<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 교육 출석부</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; }
        .header { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-start { background-color: #28a745; }
        .btn-end   { background-color: #dc3545; }
        .btn-export { background-color: #6c757d; padding: 10px 20px; font-weight: bold; }
        .btn-edit { background-color: #ffc107; color: #333; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button[disabled] { background-color: #ccc; color: #666; cursor: not-allowed; }
        input[type="text"] { width: 300px; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }

        /* ── 모달 오버레이 ── */
        #edit-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 32px 28px;
            width: 340px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-box h3 {
            margin: 0;
            font-size: 16px;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .modal-box label {
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
            display: block;
        }
        .modal-box select,
        .modal-box input[type="time"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .modal-box select:focus,
        .modal-box input[type="time"]:focus {
            outline: none;
            border-color: #007bff;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .modal-buttons button {
            padding: 9px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-modal-save   { background-color: #007bff; color: white; }
        .btn-modal-cancel { background-color: #e9ecef; color: #333; }
        .btn-modal-clear  { background-color: #fff3cd; color: #856404; border: 1px solid #ffc107 !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1>현장 출석 관리 대시보드</h1>
        <p>출석률: <span id="attendance-rate">0%</span></p>
        <button onclick="exportToExcel()" class="btn btn-export">최종 결과 엑셀 다운로드</button>
    </div>

    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="이름 또는 사번 검색...">

    <table>
        <thead>
            <tr>
                <th>부서/이름(사번)</th>
                <th>과정명</th>
                <th>날짜</th>
                <th>교육시간</th>
                <th>오전개시</th>
                <th>오전종료</th>
                <th>오후개시</th>
                <th>오후종료</th>
                <th>비고</th>
                <th>관리자 수정</th>
            </tr>
        </thead>
        <tbody id="trainee-list"></tbody>
    </table>

    <!-- ── 출결 수정 모달 ── -->
    <div id="edit-modal" onclick="if(event.target===this) closeEditModal()">
        <div class="modal-box">
            <h3 id="modal-name">출결 수정</h3>

            <div>
                <label>수정할 항목</label>
                <select id="modal-field" onchange="updateModalTimeInput()">
                    <option value="오전개시">오전 개시</option>
                    <option value="오전종료">오전 종료</option>
                    <option value="오후개시">오후 개시</option>
                    <option value="오후종료">오후 종료</option>
                </select>
            </div>

            <div>
                <label>변경할 시간</label>
                <input type="time" id="modal-time">
            </div>

            <div class="modal-buttons">
                <button class="btn-modal-clear" onclick="document.getElementById('modal-time').value=''">기록 삭제</button>
                <button class="btn-modal-cancel" onclick="closeEditModal()">취소</button>
                <button class="btn-modal-save"   onclick="saveEditModal()">저장</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
